name: Luantis Build

# Single consolidated workflow for Luantis
# - Build (client + server) runs by default on every push/PR
# - All other jobs are toggleable via workflow_dispatch inputs
on:
  push:
    branches: [main, master, 'v*', 'luantis-*']
  pull_request:
    branches: [main, master, 'v*', 'luantis-*']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (Release/Debug)'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      build_client:
        description: 'Build client binary'
        required: false
        type: boolean
        default: true
      build_server:
        description: 'Build server binary'
        required: false
        type: boolean
        default: true
      run_tests:
        description: 'Run unit tests after build'
        required: false
        type: boolean
        default: true
      package_artifacts:
        description: 'Package and upload build artifacts as zip'
        required: false
        type: boolean
        default: true
      cpp_lint:
        description: 'Run clang-tidy C++ lint'
        required: false
        type: boolean
        default: false
      lua_lint:
        description: 'Run Luacheck and Lua unit tests'
        required: false
        type: boolean
        default: false

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  BUILD_CLIENT: ${{ github.event.inputs.build_client || 'true' }}
  BUILD_SERVER: ${{ github.event.inputs.build_server || 'true' }}
  RUN_TESTS: ${{ github.event.inputs.run_tests || 'true' }}
  PACKAGE_ARTIFACTS: ${{ github.event.inputs.package_artifacts || 'true' }}

jobs:
  # ============================================================
  # MAIN BUILD JOB - Always runs, this is the most important one
  # ============================================================
  build:
    name: Build (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    # Run on push/PR always; on workflow_dispatch only if a build toggle is on
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.build_client == true ||
      inputs.build_server == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Read version from VERSION file
          if [[ -f VERSION ]]; then
            VERSION_TAG="v$(cat VERSION)"
          else
            VERSION_TAG="v0.0"
          fi

          BRANCH="${GITHUB_REF_NAME}"
          BUILD_NUM="${GITHUB_RUN_NUMBER}"
          FULL_VERSION="${VERSION_TAG}-build${BUILD_NUM}"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Branch:       $BRANCH"
          echo "Version tag:  $VERSION_TAG"
          echo "Full version: $FULL_VERSION"

      - name: Install dependencies
        run: |
          sudo apt-get update

          # Core build tools
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config

          # Common libraries (server + client)
          sudo apt-get install -y --no-install-recommends \
            zlib1g-dev libzstd-dev libsqlite3-dev libgmp-dev \
            libjsoncpp-dev libluajit-5.1-dev libcurl4-openssl-dev \
            libssl-dev libopus-dev

          # Client: Graphics, audio, media
          if [[ "${{ env.BUILD_CLIENT }}" == "true" ]]; then
            # Resolve freetype package name (differs across Ubuntu versions)
            FREETYPE_PKG="libfreetype-dev"
            if ! apt-cache showpkg libfreetype-dev 2>/dev/null | grep -q "Package: libfreetype-dev"; then
              FREETYPE_PKG="libfreetype6-dev"
            fi

            sudo apt-get install -y --no-install-recommends \
              ${FREETYPE_PKG} libgl1-mesa-dev libsdl2-dev \
              libopenal-dev libvorbis-dev libogg-dev \
              libjpeg-dev libpng-dev gettext
          fi

          # Server: Terminal UI
          if [[ "${{ env.BUILD_SERVER }}" == "true" ]]; then
            sudo apt-get install -y --no-install-recommends \
              libncurses-dev
          fi

      - name: Configure CMake
        run: |
          CMAKE_ARGS=(
            -B build
            -DCMAKE_BUILD_TYPE="${{ env.BUILD_TYPE }}"
            -DCMAKE_INSTALL_PREFIX=/usr/local
            -DRUN_IN_PLACE=TRUE
            -DENABLE_LTO=FALSE
          )

          # Build targets
          if [[ "${{ env.BUILD_CLIENT }}" == "true" ]]; then
            CMAKE_ARGS+=(-DBUILD_CLIENT=TRUE)
          else
            CMAKE_ARGS+=(-DBUILD_CLIENT=FALSE)
          fi

          if [[ "${{ env.BUILD_SERVER }}" == "true" ]]; then
            CMAKE_ARGS+=(-DBUILD_SERVER=TRUE)
          else
            CMAKE_ARGS+=(-DBUILD_SERVER=FALSE)
          fi

          # Tests
          if [[ "${{ env.RUN_TESTS }}" == "true" ]]; then
            CMAKE_ARGS+=(-DBUILD_UNITTESTS=TRUE)
          else
            CMAKE_ARGS+=(-DBUILD_UNITTESTS=FALSE)
          fi

          echo "CMake arguments: ${CMAKE_ARGS[*]}"
          cmake "${CMAKE_ARGS[@]}" .

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Run unit tests
        if: env.RUN_TESTS == 'true'
        continue-on-error: true
        id: tests
        run: |
          # With RUN_IN_PLACE=TRUE, binaries end up in bin/
          if [[ -x bin/luanti ]]; then
            ./bin/luanti --run-unittests 2>&1 | head -200
          elif [[ -x bin/luantiserver ]]; then
            ./bin/luantiserver --run-unittests 2>&1 | head -200
          else
            echo "No binaries found for unit tests, trying CTest..."
            cd build && ctest --output-on-failure -j "$(nproc)" 2>&1 | head -200
          fi

      - name: Verify binaries
        id: verify
        run: |
          echo "=== Built binaries ==="
          ls -lh bin/ 2>/dev/null || echo "WARNING: No bin/ directory found"

          CLIENT_OK=0
          SERVER_OK=0

          if [[ -x bin/luanti ]]; then
            echo "Client binary: $(file bin/luanti)"
            CLIENT_OK=1
          fi

          if [[ -x bin/luantiserver ]]; then
            echo "Server binary: $(file bin/luantiserver)"
            SERVER_OK=1
          fi

          echo "client_ok=$CLIENT_OK" >> "$GITHUB_OUTPUT"
          echo "server_ok=$SERVER_OK" >> "$GITHUB_OUTPUT"

          if [[ "$CLIENT_OK" -eq 0 ]] && [[ "$SERVER_OK" -eq 0 ]]; then
            echo "ERROR: No binaries were built successfully!"
            exit 1
          fi

      - name: Package build artifacts
        if: env.PACKAGE_ARTIFACTS == 'true'
        run: |
          VERSION="${{ steps.version.outputs.full_version }}"
          ARTIFACT_DIR="luantis-${VERSION}"
          mkdir -p "$ARTIFACT_DIR/bin"

          # Copy binaries
          if [[ -d bin ]]; then
            cp -r bin/* "$ARTIFACT_DIR/bin/" 2>/dev/null || true
          fi

          # Copy essential runtime files
          for dir in builtin client fonts textures po irr games mods; do
            if [[ -d "$dir" ]]; then
              cp -r "$dir" "$ARTIFACT_DIR/"
            fi
          done

          # Copy config, docs, and scripts
          cp minetest.conf.example "$ARTIFACT_DIR/" 2>/dev/null || true
          cp README.md "$ARTIFACT_DIR/" 2>/dev/null || true
          cp LICENSE.txt "$ARTIFACT_DIR/" 2>/dev/null || true
          cp VERSION "$ARTIFACT_DIR/" 2>/dev/null || true
          cp start_server.sh "$ARTIFACT_DIR/" 2>/dev/null || true
          cp start_client.sh "$ARTIFACT_DIR/" 2>/dev/null || true
          cp test_encryption_toggle.sh "$ARTIFACT_DIR/" 2>/dev/null || true
          cp build_linux.sh "$ARTIFACT_DIR/" 2>/dev/null || true
          cp build_env.sh "$ARTIFACT_DIR/" 2>/dev/null || true

          # Write build metadata
          cat > "$ARTIFACT_DIR/BUILD_INFO.txt" <<EOF
          Luantis Build Info
          ==================
          Version:          ${VERSION}
          Build Type:       ${{ env.BUILD_TYPE }}
          Build Date:       $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Git Commit:       $(git rev-parse HEAD)
          Git Branch:       ${{ steps.version.outputs.branch }}
          GitHub Run:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Runner OS:        Ubuntu 24.04
          Client Built:     ${{ steps.verify.outputs.client_ok }}
          Server Built:     ${{ steps.verify.outputs.server_ok }}
          Unit Tests:       ${{ steps.tests.outcome }}
          Encryption:       Modular (AES-256-GCM with SRP, toggleable via secure_connection)
          EOF
          sed -i 's/^          //' "$ARTIFACT_DIR/BUILD_INFO.txt"

          # Create zip
          zip -r "luantis-${VERSION}.zip" "$ARTIFACT_DIR"

          echo ""
          echo "=== Package contents ==="
          unzip -l "luantis-${VERSION}.zip" | tail -5

      - name: Upload build artifact
        if: env.PACKAGE_ARTIFACTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: luantis-${{ steps.version.outputs.full_version }}
          path: luantis-${{ steps.version.outputs.full_version }}.zip
          retention-days: 90

      - name: Build summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  Luantis Build Summary"
          echo "============================================"
          echo "  Version:  ${{ steps.version.outputs.full_version }}"
          echo "  Client:   ${{ steps.verify.outputs.client_ok }}"
          echo "  Server:   ${{ steps.verify.outputs.server_ok }}"
          echo "  Tests:    ${{ steps.tests.outcome }}"
          echo "  Packaged: ${{ env.PACKAGE_ARTIFACTS }}"
          echo "============================================"

  # ============================================================
  # OPTIONAL: C++ Lint (toggleable, default OFF)
  # ============================================================
  cpp_lint:
    name: C++ Lint (clang-tidy)
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.cpp_lint == 'true' }}

    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          source ./util/ci/common.sh
          install_linux_deps clang-tidy-15

      - name: Run clang-tidy
        run: |
          ./util/ci/clang-tidy.sh

  # ============================================================
  # OPTIONAL: Lua Lint (toggleable, default OFF)
  # ============================================================
  lua_lint:
    name: Lua Lint & Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.lua_lint == 'true' }}

    steps:
      - uses: actions/checkout@v4
      - uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.1.5"
      - uses: leafo/gh-actions-luarocks@v6

      - name: Install LuaJIT
        run: ./util/ci/build_luajit.sh

      - name: Install luarocks tools
        run: |
          luarocks install --local luacheck
          luarocks install --local busted

      - name: Run checks (builtin)
        run: |
          $HOME/.luarocks/bin/luacheck builtin
          $HOME/.luarocks/bin/busted builtin
          $HOME/.luarocks/bin/busted builtin --lua=$HOME/LuaJIT/src/luajit

      - name: Run checks (devtest)
        run: |
          $HOME/.luarocks/bin/luacheck --config=games/devtest/.luacheckrc games/devtest
